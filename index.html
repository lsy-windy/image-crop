<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Crop Workspace</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div class="app" id="app" style="--sidebar-width: 300px">
      <aside class="sidebar" id="sidebar">
        <h1>Image Crop</h1>

        <input id="fileInput" type="file" accept="image/*" hidden />

        <div class="control-group row">
          <button id="cropBtn" type="button" disabled>이미지 저장</button>
          <button id="previewBtn" type="button" disabled>미리보기</button>
        </div>

        <div class="control-group">
          <p class="group-title">크롭 비율</p>
          <div class="ratio-group" id="ratioGroup">
            <button type="button" class="ratio-btn" data-ratio="16:9" disabled>16:9</button>
            <button type="button" class="ratio-btn" data-ratio="4:3" disabled>4:3</button>
            <button type="button" class="ratio-btn" data-ratio="1:1" disabled>1:1</button>
            <button type="button" class="ratio-btn" data-ratio="custom" disabled>자유</button>
          </div>
        </div>

        <div class="control-group">
          <p class="group-title">해상도 조절</p>
          <div class="ratio-group">
            <button id="optionUpscaleBtn" type="button" disabled>업스케일</button>
            <button id="optionDownscaleBtn" type="button" disabled>다운스케일</button>
          </div>
        </div>

        <div class="control-group">
          <p class="group-title">보정 해상도 조절</p>
          <div class="ratio-group">
            <button id="optionAiUpscaleBtn" type="button" disabled>보정 업스케일</button>
            <button id="optionAiDownscaleBtn" type="button" disabled>보정 다운스케일</button>
          </div>
        </div>

        <div class="control-group">
          <button id="restoreBtn" type="button" disabled>원상복구</button>
        </div>

        <section class="crop-info" id="cropInfo">
          <h2>저장 예상 정보</h2>
          <p class="format-row">
            <strong>포맷:</strong>
            <select id="formatSelect">
              <option value="png" selected>PNG</option>
              <option value="jpg">JPG</option>
              <option value="jpeg">JPEG</option>
              <option value="webp">WEBP</option>
              <option value="gif">GIF</option>
              <option value="bmp">BMP</option>
              <option value="tiff">TIFF</option>
              <option value="avif">AVIF</option>
              <option value="heic">HEIC</option>
              <option value="ico">ICO</option>
            </select>
          </p>
          <p><strong>크기:</strong> <span id="infoSize">-</span></p>
          <p><strong>용량:</strong> <span id="infoBytes">-</span></p>
          <p><strong>비율:</strong> <span id="infoRatio">-</span></p>
        </section>
      </aside>

      <div class="resizer" id="resizer" role="separator" aria-label="사이드바 크기 조절" aria-orientation="vertical" tabindex="0"></div>

      <main class="workspace" id="dropzone">
        <div class="drop-overlay" id="dropOverlay">여기에 이미지를 드래그 앤 드롭</div>
        <canvas id="canvas" aria-label="이미지 편집 영역"></canvas>
        <button id="uploadTrigger" class="upload-trigger" type="button">
          <span class="upload-trigger-title">이미지 업로드</span>
          <span class="upload-trigger-desc">파일을 드래그 앤 드롭하거나 이 영역을 클릭하세요</span>
        </button>
        <div class="context-menu" id="cropContextMenu" role="menu" aria-hidden="true">업데이트 예정</div>
      </main>
    </div>

    <div class="modal-backdrop" id="ratioModalBackdrop" hidden>
      <section class="ratio-modal" role="dialog" aria-modal="true" aria-labelledby="ratioModalTitle">
        <h2 id="ratioModalTitle">사용자 비율 입력</h2>
        <p class="ratio-modal-desc">가로/세로 값을 입력하세요. 예: 16 / 10</p>
        <div class="ratio-input-row">
          <label for="ratioWidthInput">가로</label>
          <input id="ratioWidthInput" type="number" min="1" step="1" value="16" />
          <span>:</span>
          <label for="ratioHeightInput">세로</label>
          <input id="ratioHeightInput" type="number" min="1" step="1" value="10" />
        </div>
        <p class="ratio-error" id="ratioErrorText" aria-live="polite"></p>
        <div class="ratio-modal-actions">
          <button type="button" id="ratioApplyBtn">적용</button>
          <button type="button" id="ratioCancelBtn" class="secondary">취소</button>
        </div>
      </section>
    </div>

    <div class="modal-backdrop" id="scaleSwitchModalBackdrop" hidden>
      <section class="ratio-modal" role="dialog" aria-modal="true" aria-labelledby="scaleSwitchModalTitle">
        <h2 id="scaleSwitchModalTitle">기능 전환 확인</h2>
        <p class="ratio-modal-desc">이미지가 초기화 후 가능합니다. 진행하시겠습니까?</p>
        <div class="ratio-modal-actions">
          <button type="button" id="scaleSwitchConfirmBtn">확인</button>
          <button type="button" id="scaleSwitchCancelBtn" class="secondary">취소</button>
        </div>
      </section>
    </div>

    <div class="modal-backdrop" id="saveFormatModalBackdrop" hidden>
      <section class="ratio-modal" role="dialog" aria-modal="true" aria-labelledby="saveFormatModalTitle">
        <h2 id="saveFormatModalTitle">저장 안내</h2>
        <p class="ratio-modal-desc">하단에서 선택한 확장자로 저장됩니다.</p>
        <label class="modal-check-row" for="saveFormatDontShowChk">
          <input id="saveFormatDontShowChk" type="checkbox" />
          <span>다시 보지 않기</span>
        </label>
        <div class="ratio-modal-actions">
          <button type="button" id="saveFormatConfirmBtn">확인</button>
          <button type="button" id="saveFormatCancelBtn" class="secondary">취소</button>
        </div>
      </section>
    </div>

    <script src="./src/scripts/main.js"></script>
  </body>
</html>
